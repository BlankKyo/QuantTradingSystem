# ──────────────────────────────────────────────
#  QuantTradingSystem — Configuration File
#  v0.9.0
# ──────────────────────────────────────────────

[backtester]
data_path     = data/prices.csv
initial_cash  = 100000
trading_days  = 252

[logging]
# Levels: DEBUG, INFO, WARNING, ERROR
log_level     = INFO
log_file      = logs/backtester.log

[strategy.ma]
short_window  = 5
long_window   = 20
ma_type       = SMA     # SMA or EMA

[strategy.rsi]
period        = 14
oversold      = 30
overbought    = 70

[strategy.bollinger]
period        = 20
k             = 2.0

[optimization.ma]
enabled       = true
short_min     = 2
short_max     = 8
long_min      = 10
long_max      = 30
long_step     = 5
metric        = SHARPE   # SHARPE, RETURN, DRAWDOWN, PROFIT_FACTOR, WIN_RATE
top_n         = 5

[optimization.rsi]
enabled       = true
period_min    = 10
period_max    = 20
period_step   = 2
oversold_min  = 20
oversold_max  = 35
oversold_step = 5
overbought_min  = 65
overbought_max  = 80
overbought_step = 5
metric          = SHARPE
top_n           = 5